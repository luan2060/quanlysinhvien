<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thời Khóa Biểu</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .day-header {
            background-color: #00509e;
            color: white;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .day-header.today {
            background-color: #e63946;
        }

        .mon-card {
            border: none;
            border-radius: 12px;
            border-left: 5px solid #00509e !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            margin-bottom: 12px;
            transition: transform 0.15s;
        }

        .mon-card:hover {
            transform: translateY(-3px);
        }

        .ca-badge {
            background-color: #e8f0fe;
            color: #00509e;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .empty-day {
            border: 2px dashed #dee2e6;
            border-radius: 12px;
            padding: 32px 12px;
            text-align: center;
            color: #adb5bd;
        }

        .col-day {
            flex: 1 1 0%;
            min-width: 160px; 
        }

        .tkb-scroll::-webkit-scrollbar {
            height: 6px;
        }

        .tkb-scroll::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="position-fixed top-0 start-0 vh-100 shadow-lg"
     style="width: 260px; z-index: 1030; background-color: #1a252f;">
    <div th:replace="~{layout/sidebar :: sidebar('thoikhoabieu')}"></div>
</div>

<div style="margin-left: 260px; min-height: 100vh;">

    <div class="container-fluid p-4">

        <!-- HEADER -->
        <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 pb-3 border-bottom border-2"
             style="border-color: #00509e !important;">

            <div>
                <h2 class="fw-bold text-dark mb-1">
                    Thời khóa biểu
                </h2>
                <p class="text-muted mb-0 small">
                    Học kỳ <span th:text="${hocKy}"></span>
                    –
                    Năm học <span th:text="${namHoc}"></span>
                </p>
            </div>

            <!-- FILTER -->
            <form method="get"
                  action="/sinhvien/lichhoc"
                  class="d-flex align-items-center gap-2 mt-3 mt-md-0">

                <select name="hocKy" class="form-select form-select-sm" style="width:120px;">
                    <option value="1" th:selected="${hocKy == 1}">Học kỳ 1</option>
                    <option value="2" th:selected="${hocKy == 2}">Học kỳ 2</option>
                </select>

                <select name="namHoc" class="form-select form-select-sm" style="width:130px;">
                    <option value="2024-2025" th:selected="${namHoc == '2024-2025'}">2024-2025</option>
                    <option value="2025-2026" th:selected="${namHoc == '2025-2026'}">2025-2026</option>
                </select>

                <button type="submit" class="btn btn-sm text-white fw-medium" style="background-color:#00509e;">
                    <i class="fas fa-filter me-1"></i> Lọc
                </button>
            </form>
        </div>

        <!-- BẢNG LỊCH -->
        <div class="row flex-nowrap overflow-auto pb-3 tkb-scroll mx-0">

            <th:block th:each="thu : ${#numbers.sequence(2,7)}">

                <div class="col-day px-2">

                    <!-- HEADER THỨ -->
                    <div th:class="${ngayHienTai == thu} ? 'day-header today' : 'day-header'">
                        <div th:switch="${thu}">
                            <span th:case="2">THỨ 2</span>
                            <span th:case="3">THỨ 3</span>
                            <span th:case="4">THỨ 4</span>
                            <span th:case="5">THỨ 5</span>
                            <span th:case="6">THỨ 6</span>
                            <span th:case="7">THỨ 7</span>
                        </div>
                    </div>

                    <!-- CÓ LỊCH (Sử dụng #lists.isEmpty) -->
                    <th:block th:if="${not #lists.isEmpty(lichHoc.get(thu))}">

                        <div th:each="lop : ${lichHoc.get(thu)}" class="mon-card card">
                            <div class="card-body p-3">
                                <!-- TÊN MÔN -->
                                <h6 class="fw-bold mb-1" style="color:#00509e; font-size:0.9rem;"
                                    th:text="${lop.hocPhan != null ? lop.hocPhan.tenHocPhan : lop.tenLopHP}">
                                </h6>

                                <!-- MÃ LỚP -->
                                <div class="text-muted small mb-2" th:text="${lop.maLopHP}"></div>

                                <!-- CA -->
                                <div th:if="${lop.caHoc != null}" class="mb-2">
                                    <span class="ca-badge" th:text="'Ca ' + ${lop.caHoc}"></span>
                                    <span class="small text-muted ms-1"
                                          th:text="${lop.gioHoc != null ? '(' + lop.gioHoc + ')' : ''}">
                                    </span>
                                </div>

                                <hr class="my-2 opacity-25">

                                <!-- PHÒNG -->
                                <div class="small mb-1 text-dark">
                                    <i class="fas fa-map-marker-alt me-2 text-danger"></i> Phòng:
                                    <span class="fw-medium" th:text="${lop.phongHoc != null ? lop.phongHoc : 'Chưa xếp'}"></span>
                                </div>

                                <!-- GIẢNG VIÊN -->
                                <div class="small text-dark">
                                    <i class="fas fa-chalkboard-teacher me-2" style="color:#00509e;"></i>
                                    <span th:text="${lop.giangVien != null ? lop.giangVien.tenNV : 'Chưa phân công'}"></span>
                                </div>
                            </div>
                        </div>
                    </th:block>

                    <!-- KHÔNG CÓ LỊCH (Sử dụng #lists.isEmpty) -->
                    <div th:if="${#lists.isEmpty(lichHoc.get(thu))}" class="empty-day">
                        <i class="fas fa-mug-hot fs-3 mb-2 d-block"></i>
                        <span class="small">Không có lịch</span>
                    </div>

                </div>

            </th:block>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
