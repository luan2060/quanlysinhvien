<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Lớp Hành Chính Mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style> body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; } </style>
</head>
<body>
    <div class="position-fixed top-0 start-0 vh-100 shadow-lg" style="width: 260px; z-index: 1030; background-color: #1a252f;">
        <div th:replace="~{layout/header :: header('tongquan')}"></div>
    </div>
    
    <div style="margin-left: 260px; min-height: 100vh;">
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold text-dark mb-1">Thêm Lớp Mới</h4>
                    <p class="text-muted small mb-0">Tạo thông tin cho lớp hành chính và phân công cố vấn</p>
                </div>
                <a th:href="@{/admin/lop}" class="btn btn-light border shadow-sm">
                    <i class="fa-solid fa-arrow-left me-2"></i>Quay lại danh sách
                </a>
            </div>

            <div class="card border-0 shadow-sm" style="border-radius: 15px; overflow: hidden;">
                <div class="card-header bg-white border-0 py-3 border-bottom">
                    <h6 class="fw-bold mb-0 text-primary"><i class="fa-solid fa-chalkboard-user me-2"></i>Thông tin chi tiết lớp học</h6>
                </div>
                <div class="card-body p-4 p-md-5">
                    
                    <form th:action="@{/admin/lop/save}" th:object="${lophc}" method="post">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label for="maLopHc" class="form-label fw-bold">Mã lớp HC <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="maLopHc" th:field="*{maLopHc}" placeholder="VD: DH12CNTT1" required>
                            </div>
                            <div class="col-md-6">
                                <label for="tenLopHc" class="form-label fw-bold">Tên lớp HC <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="tenLopHc" th:field="*{tenLopHc}" placeholder="VD: Đại học CNTT Khóa 12 Lớp 1" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label for="khoaHoc" class="form-label fw-bold">Khóa học <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="khoaHoc" th:field="*{khoaHoc}" placeholder="VD: Khóa 11, K12..." required>
                            </div>
                            
                            <div class="col-md-6">
                                <label for="trangThai" class="form-label fw-bold">Trạng thái</label>
                                <select class="form-select" id="trangThai" th:field="*{trangThai}">
                                    <option value="Đang học">Đang học</option>
                                    <option value="Chưa bắt đầu">Chưa bắt đầu</option>
                                    <option value="Đã tốt nghiệp">Đã tốt nghiệp</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Thuộc Ngành đào tạo <span class="text-danger">*</span></label>
                                <!-- Controller hứng tham số: @RequestParam("nganhid") int nganhId -->
                                <select name="nganhid" class="form-select" required>
                                    <option value="">-- Chọn ngành trực thuộc --</option>
                                    <option th:each="n : ${listnganh}" th:value="${n.id}" th:text="${n.tenNganh}"></option>
                                </select> 
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-bold">Cố vấn học tập <span class="text-danger">*</span></label>
                                <!-- Controller hứng tham số: @RequestParam("covanid") int covanId -->
                                <select name="covanid" class="form-select" required>
                                    <option value="">-- Phân công cố vấn --</option>
                                    <option th:each="cv : ${listcovan}" th:value="${cv.id}" th:text="${cv.tenNV}"></option>
                                </select> 
                            </div>
                        </div>
                        <hr class="my-4 text-muted">
                        <div class="d-flex justify-content-end gap-2">
                            <button type="reset" class="btn btn-light border px-4">Làm mới</button>
                            <button type="submit" class="btn btn-primary px-4 shadow-sm">
                                <i class="fa-solid fa-floppy-disk me-2"></i>Lưu thông tin lớp
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
