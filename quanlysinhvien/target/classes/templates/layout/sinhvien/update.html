<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập Nhật Sinh Viên | Quản Lý Sinh Viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .form-control:focus, .form-select:focus {
            box-shadow: none;
            border-color: #0d6efd;
        }
        .card { border-radius: 15px; }
    </style>
</head>
<body>

    <div class="position-fixed top-0 start-0 vh-100 shadow-lg" 
         style="width: 260px; z-index: 1030; background-color: #1a252f;">
        <div th:replace="~{layout/header :: header('tongquan')}"></div>
    </div>

    <div style="margin-left: 260px; min-height: 100vh;">
        <div class="container-fluid p-4">
            
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold text-dark mb-1">Hệ Thống Quản Lý Sinh Viên</h4>
                    <p class="text-muted small mb-0">
                        Chỉnh sửa thông tin sinh viên: 
                        <span class="text-primary" th:text="${sinhvien.hoTen}"></span>
                    </p>
                </div>
                <a th:href="@{/admin/sinhvien}" class="btn btn-light border shadow-sm">
                    <i class="fa-solid fa-arrow-left me-2"></i>Quay lại danh sách
                </a>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3 border-bottom">
                    <h6 class="fw-bold mb-0 text-primary">
                        <i class="fa-solid fa-user-pen me-2"></i>Cập nhật thông tin chi tiết
                    </h6>
                </div>
                <div class="card-body p-4">
                    
                    <!-- SỬA 1: action và object đổi sang sinhvien -->
                    <form th:action="@{/admin/sinhvien/update}" th:object="${sinhvien}" method="post">
                        
                        <input type="hidden" th:field="*{id}">

                        <div class="row g-4">
                            
                            <div class="col-md-6">
                                <label class="form-label fw-medium text-dark small">Mã Sinh Viên (Cố định)</label>
                                <input type="text" th:field="*{maSV}" 
                                       class="form-control bg-light border-0 py-2" readonly>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-medium text-dark small">
                                    Họ và Tên <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{hoTen}" 
                                       class="form-control bg-light border-0 py-2" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-medium text-dark small">Ngày Sinh</label>
                                <input type="date" th:field="*{ngaySinh}" 
                                       class="form-control bg-light border-0 py-2">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-medium text-dark small">Giới Tính</label>
                                <select th:field="*{gioiTinh}" class="form-select bg-light border-0 py-2">
                                    <option value="Nam">Nam</option>
                                    <option value="Nữ">Nữ</option>
                                    <option value="Khác">Khác</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-medium text-dark small">
                                    Email Trường Cấp <span class="text-danger">*</span>
                                </label>
                                <input type="email" th:field="*{email}" 
                                       class="form-control bg-light border-0 py-2" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-medium text-dark small">Số Điện Thoại</label>
                                <input type="tel" th:field="*{sdt}" 
                                       class="form-control bg-light border-0 py-2">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-medium text-dark small">
                                    Mật Khẩu <span class="text-danger">*</span>
                                </label>
                                <input type="password" th:field="*{password}" 
                                       class="form-control bg-light border-0 py-2" required>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-medium text-dark small">Trạng Thái</label>
                                <!-- SỬA 2: value "Tốt nghiệp" đúng -->
                                <select th:field="*{trangThai}" class="form-select bg-light border-0 py-2">
                                    <option value="Đang học">Đang học</option>
                                    <option value="Bảo lưu">Bảo lưu</option>
                                    <option value="Nghỉ học">Nghỉ học</option>
                                    <option value="Tốt nghiệp">Tốt nghiệp</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-medium text-dark small">
                                    Lớp Hành Chính <span class="text-danger">*</span>
                                </label>
                                <select name="lopHanhChinh" class="form-select bg-light border-0 py-2" required>
                                    <option value="">-- Chọn lớp --</option>
                                    <option th:each="lop : ${listLop}" 
                                            th:value="${lop.id}" 
                                            th:text="${lop.tenLopHc}"
                                            th:selected="${sinhvien.lopHanhChinh != null and lop.id == sinhvien.lopHanhChinh.id}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-medium text-dark small">Địa Chỉ</label>
                                <input type="text" th:field="*{diaChi}" 
                                       class="form-control bg-light border-0 py-2">
                            </div>

                        </div>

                        <hr class="my-4 text-muted">

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/admin/sinhvien}" class="btn btn-light px-4">Hủy bỏ</a>
                            <button type="submit" class="btn btn-warning px-5 shadow-sm text-white">
                                <i class="fa-solid fa-floppy-disk me-2"></i>Lưu Thay Đổi
                            </button>
                        </div>

                    </form>

                </div>
            </div>
        </div> 
    </div> 

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
