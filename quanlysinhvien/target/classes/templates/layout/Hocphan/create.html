<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Học Phần & Lớp Học Phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style> body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; } </style>
</head>
<body>
    <div class="position-fixed top-0 start-0 vh-100 shadow-lg" style="width: 260px; z-index: 1030; background-color: #1a252f;">
        <div th:replace="~{layout/header :: header('tongquan')}"></div>
    </div>

    <div style="margin-left: 260px; min-height: 100vh;">
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold text-dark mb-0">Tạo Học Phần Mới</h4>
                <a th:href="@{/admin/hocphan}" class="btn btn-light border shadow-sm">
                    <i class="fa-solid fa-arrow-left me-2"></i>Quay lại
                </a>
            </div>

            <form th:action="@{/admin/hocphan/create}" th:object="${hocphan}" method="post">

                <!-- THÔNG TIN HỌC PHẦN -->
                <div class="card border-0 shadow-sm mb-4" style="border-radius: 15px;">
                    <div class="card-header bg-white border-0 py-3 border-bottom">
                        <h6 class="fw-bold mb-0 text-primary">
                            <i class="fa-solid fa-book-journal-whills me-2"></i>Thông tin Học phần
                        </h6>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-4">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Mã Học phần <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{maHocPhan}" placeholder="VD: INT101" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Tên Học phần <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{tenHocPhan}" placeholder="VD: Lập trình Web" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Số tín chỉ</label>
                                <input type="number" class="form-control" th:field="*{soTinChi}" min="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Ngành áp dụng</label>
                                <select class="form-select" name="nganhId">
                                    <option value="">-- Chọn ngành --</option>
                                    <option th:each="nganh : ${danhSachNganh}"
                                            th:value="${nganh.id}"
                                            th:text="${nganh.maNganh + ' - ' + nganh.tenNganh}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Số tiết Lý thuyết</label>
                                <input type="number" class="form-control" th:field="*{soTietLyThuyet}" min="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Số tiết Thực hành</label>
                                <input type="number" class="form-control" th:field="*{soTietThucHanh}" min="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Học phí (VNĐ)</label>
                                <input type="number" class="form-control" th:field="*{hocPhi}" min="0">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- DANH SÁCH LỚP HỌC PHẦN -->
                <div class="card border-0 shadow-sm" style="border-radius: 15px;">
                    <div class="card-header bg-white border-0 py-3 border-bottom d-flex justify-content-between align-items-center">
                        <h6 class="fw-bold mb-0 text-success">
                            <i class="fa-solid fa-layer-group me-2"></i>Các Lớp Học Phần
                        </h6>
                        <button type="button" class="btn btn-sm btn-outline-success fw-bold" onclick="addLopHP()">
                            <i class="fa-solid fa-plus me-1"></i>Thêm Lớp
                        </button>
                    </div>
                    <div class="card-body p-4 bg-light" id="lopHP-container">

                        <!-- Lớp mặc định đầu tiên -->
                        <div class="row g-3 p-3 bg-white shadow-sm mb-3 position-relative lophp-row"
                             style="border-radius: 10px; border-left: 4px solid #198754;">
                            <div class="col-md-3">
                                <label class="form-label fw-bold small text-muted">Mã Lớp HP <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="listLopHP[0].maLopHP" required>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold small text-muted">Tên Lớp HP <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="listLopHP[0].tenLopHP" required>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label fw-bold small text-muted">Học Kỳ</label>
                                <input type="number" class="form-control" name="listLopHP[0].hocKy" placeholder="1">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label fw-bold small text-muted">Năm Học</label>
                                <input type="text" class="form-control" name="listLopHP[0].namHoc" placeholder="2025-2026">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label fw-bold small text-muted">Sĩ số tối đa</label>
                                <input type="number" class="form-control" name="listLopHP[0].siSoToiDa" value="50">
                            </div>
                            <!-- ✅ Thứ trong tuần -->
                            <div class="col-md-2">
                                <label class="form-label fw-bold small text-muted">Thứ trong tuần</label>
                                <select class="form-select" name="listLopHP[0].thuTrongTuan">
                                    <option value="">-- Chọn thứ --</option>
                                    <option value="2">Thứ 2</option>
                                    <option value="3">Thứ 3</option>
                                    <option value="4">Thứ 4</option>
                                    <option value="5">Thứ 5</option>
                                    <option value="6">Thứ 6</option>
                                    <option value="7">Thứ 7</option>
                                </select>
                            </div>
                            <!-- ✅ Ca học -->
                            <div class="col-md-3">
                                <label class="form-label fw-bold small text-muted">Ca học</label>
                                <select class="form-select" name="listLopHP[0].caHoc">
                                    <option value="">-- Chọn ca --</option>
                                    <option value="1">Ca 1 (07:00 - 09:25)</option>
                                    <option value="2">Ca 2 (09:35 - 12:00)</option>
                                    <option value="3">Ca 3 (13:00 - 15:25)</option>
                                    <option value="4">Ca 4 (15:35 - 18:00)</option>
                                </select>
                            </div>
                            <!-- ✅ Giờ học hiển thị -->
                            <div class="col-md-2">
                                <label class="form-label fw-bold small text-muted">Giờ học</label>
                                <input type="text" class="form-control" name="listLopHP[0].gioHoc"
                                       placeholder="07:00 - 09:25">
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold small text-muted">Phòng học</label>
                                <input type="text" class="form-control" name="listLopHP[0].phongHoc" placeholder="VD: A101">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-muted">Giảng viên</label>
                                <select class="form-select" name="listLopHP[0].giangVien.id">
                                    <option value="">-- Chọn GV --</option>
                                    <option th:each="gv : ${listgiangvien}"
                                            th:value="${gv.id}"
                                            th:text="${gv.maNV + ' - ' + gv.tenNV}">
                                    </option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a th:href="@{/admin/hocphan}" class="btn btn-light border px-4">Hủy</a>
                    <button type="submit" class="btn btn-primary px-5 shadow-sm py-2 fw-bold">
                        <i class="fa-solid fa-floppy-disk me-2"></i>Lưu toàn bộ
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Template nằm NGOÀI form -->
    <div id="lopHP-template" style="display:none;">
        <div class="row g-3 p-3 bg-white shadow-sm mb-3 position-relative lophp-row"
             style="border-radius: 10px; border-left: 4px solid #198754;">
            <div class="col-md-3">
                <label class="form-label fw-bold small text-muted">Mã Lớp HP <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="listLopHP[__INDEX__].maLopHP">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold small text-muted">Tên Lớp HP <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="listLopHP[__INDEX__].tenLopHP">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small text-muted">Học Kỳ</label>
                <input type="number" class="form-control" name="listLopHP[__INDEX__].hocKy">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small text-muted">Năm Học</label>
                <input type="text" class="form-control" name="listLopHP[__INDEX__].namHoc">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small text-muted">Sĩ số tối đa</label>
                <input type="number" class="form-control" name="listLopHP[__INDEX__].siSoToiDa" value="50">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small text-muted">Thứ trong tuần</label>
                <select class="form-select" name="listLopHP[__INDEX__].thuTrongTuan">
                    <option value="">-- Chọn thứ --</option>
                    <option value="2">Thứ 2</option>
                    <option value="3">Thứ 3</option>
                    <option value="4">Thứ 4</option>
                    <option value="5">Thứ 5</option>
                    <option value="6">Thứ 6</option>
                    <option value="7">Thứ 7</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold small text-muted">Ca học</label>
                <select class="form-select" name="listLopHP[__INDEX__].caHoc">
                    <option value="">-- Chọn ca --</option>
                    <option value=" 1 (07:00 - 09:25)">Ca 1 (07:00 - 09:25)</option>
                    <option value="2 (09:35 - 12:00)">Ca 2 (09:35 - 12:00)</option>
                    <option value="3 (13:00 - 15:25)">Ca 3 (13:00 - 15:25)</option>
                    <option value="4 (15:35 - 18:00)">Ca 4 (15:35 - 18:00)</option>
                </select>
            </div>
                <div class="col-md-2">
                                <label class="form-label fw-bold small text-muted">Giờ học</label>
                                <input type="text" class="form-control" name="listLopHP[0].gioHoc"
                                       placeholder="07:00 - 09:25">
                            </div>
       
            <div class="col-md-3">
                <label class="form-label fw-bold small text-muted">Phòng học</label>
                <input type="text" class="form-control" name="listLopHP[__INDEX__].phongHoc">
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">Giảng viên</label>
                <select class="form-select" name="listLopHP[__INDEX__].giangVien.id">
                    <option value="">-- Chọn GV --</option>
                    <option th:each="gv : ${listgiangvien}"
                            th:value="${gv.id}"
                            th:text="${gv.maNV + ' - ' + gv.tenNV}">
                    </option>
                </select>
            </div>
            <button type="button"
                    class="btn btn-sm btn-danger position-absolute top-0 end-0 mt-2 me-2"
                    style="width:30px;height:30px;padding:0;line-height:30px;"
                    onclick="this.closest('.lophp-row').remove()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <script>
        let index = 1;
        function addLopHP() {
            const container = document.getElementById('lopHP-container');
            const template = document.getElementById('lopHP-template').innerHTML;
            const newHTML = template.replace(/__INDEX__/g, index);
            const wrapper = document.createElement('div');
            wrapper.innerHTML = newHTML;
            const newRow = wrapper.firstElementChild;
            container.appendChild(newRow);
            index++;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
