<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập Nhật Học Phần</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style> body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; } </style>
</head>
<body>
    <div class="position-fixed top-0 start-0 vh-100 shadow-lg" style="width: 260px; z-index: 1030; background-color: #1a252f;">
        <div th:replace="~{layout/header :: header('tongquan')}"></div>
    </div>

    <div style="margin-left: 260px; min-height: 100vh;">
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="fw-bold text-dark mb-0">Cập Nhật Học Phần</h4>
                <a th:href="@{/admin/hocphan}" class="btn btn-light border shadow-sm">
                    <i class="fa-solid fa-arrow-left me-2"></i>Quay lại
                </a>
            </div>

            <form th:action="@{/admin/hocphan/update}" th:object="${hocphan}" method="post">
                <input type="hidden" th:field="*{id}">

                <!-- THÔNG TIN HỌC PHẦN -->
                <div class="card border-0 shadow-sm mb-4" style="border-radius: 15px;">
                    <div class="card-header bg-white border-0 py-3 border-bottom">
                        <h6 class="fw-bold mb-0 text-primary">
                            <i class="fa-solid fa-book-journal-whills me-2"></i>Thông tin Học phần
                        </h6>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-4">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Mã Học phần <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{maHocPhan}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Tên Học phần <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" th:field="*{tenHocPhan}" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Số tín chỉ</label>
                                <input type="number" class="form-control" th:field="*{soTinChi}" min="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Ngành áp dụng</label>
                                <select class="form-select" name="nganhId">
                                    <option value="">-- Chọn ngành --</option>
                                    <option th:each="nganh : ${danhSachNganh}"
                                            th:value="${nganh.id}"
                                            th:text="${nganh.maNganh + ' - ' + nganh.tenNganh}"
                                            th:selected="${hocphan.nganh != null and hocphan.nganh.id == nganh.id}">
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Số tiết Lý thuyết</label>
                                <input type="number" class="form-control" th:field="*{soTietLyThuyet}" min="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Số tiết Thực hành</label>
                                <input type="number" class="form-control" th:field="*{soTietThucHanh}" min="0">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Học phí (VNĐ)</label>
                                <input type="number" class="form-control" th:field="*{hocPhi}" min="0">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- DANH SÁCH LỚP HỌC PHẦN -->
                <div class="card border-0 shadow-sm" style="border-radius: 15px;">
                    <div class="card-header bg-white border-0 py-3 border-bottom d-flex justify-content-between align-items-center">
                        <h6 class="fw-bold mb-0 text-success">
                            <i class="fa-solid fa-layer-group me-2"></i>Các Lớp Học Phần
                        </h6>
                        <button type="button" class="btn btn-sm btn-outline-success fw-bold" onclick="addLopHP()">
                            <i class="fa-solid fa-plus me-1"></i>Thêm Lớp
                        </button>
                    </div>
                    <div class="card-body p-4 bg-light" id="lopHP-container">

                        <!-- Lớp hiện có — dùng Thymeleaf bình thường -->
                        <th:block th:each="lop, stat : ${hocphan.listLopHP}">
                            <div class="row g-3 p-3 bg-white shadow-sm mb-3 position-relative lophp-row"
                                 style="border-radius: 10px; border-left: 4px solid #0d6efd;">
                                <input type="hidden"
                                       th:name="'listLopHP[' + ${stat.index} + '].id'"
                                       th:value="${lop.id}">
                                <div class="col-md-3">
                                    <label class="form-label fw-bold small text-muted">Mã Lớp HP</label>
                                    <input type="text" class="form-control"
                                           th:name="'listLopHP[' + ${stat.index} + '].maLopHP'"
                                           th:value="${lop.maLopHP}" required>
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label fw-bold small text-muted">Tên Lớp HP</label>
                                    <input type="text" class="form-control"
                                           th:name="'listLopHP[' + ${stat.index} + '].tenLopHP'"
                                           th:value="${lop.tenLopHP}" required>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label fw-bold small text-muted">Học Kỳ</label>
                                    <input type="number" class="form-control"
                                           th:name="'listLopHP[' + ${stat.index} + '].hocKy'"
                                           th:value="${lop.hocKy}">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label fw-bold small text-muted">Năm Học</label>
                                    <input type="text" class="form-control"
                                           th:name="'listLopHP[' + ${stat.index} + '].namHoc'"
                                           th:value="${lop.namHoc}">
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label fw-bold small text-muted">Sĩ số tối đa</label>
                                    <input type="number" class="form-control"
                                           th:name="'listLopHP[' + ${stat.index} + '].siSoToiDa'"
                                           th:value="${lop.siSoToiDa}">
                                </div>
                                <!-- ✅ Thứ trong tuần — null check -->
                                <div class="col-md-2">
                                    <label class="form-label fw-bold small text-muted">Thứ trong tuần</label>
                                    <select class="form-select"
                                            th:name="'listLopHP[' + ${stat.index} + '].thuTrongTuan'">
                                        <option value="">-- Chọn thứ --</option>
                                        <option value="2" th:selected="${lop.thuTrongTuan != null and lop.thuTrongTuan == 2}">Thứ 2</option>
                                        <option value="3" th:selected="${lop.thuTrongTuan != null and lop.thuTrongTuan == 3}">Thứ 3</option>
                                        <option value="4" th:selected="${lop.thuTrongTuan != null and lop.thuTrongTuan == 4}">Thứ 4</option>
                                        <option value="5" th:selected="${lop.thuTrongTuan != null and lop.thuTrongTuan == 5}">Thứ 5</option>
                                        <option value="6" th:selected="${lop.thuTrongTuan != null and lop.thuTrongTuan == 6}">Thứ 6</option>
                                        <option value="7" th:selected="${lop.thuTrongTuan != null and lop.thuTrongTuan == 7}">Thứ 7</option>
                                    </select>
                                </div>
                                <!-- ✅ Ca học — null check -->
                                <div class="col-md-3">
                                    <label class="form-label fw-bold small text-muted">Ca học</label>
                                    <select class="form-select"
                                            th:name="'listLopHP[' + ${stat.index} + '].caHoc'">
                                        <option value="">-- Chọn ca --</option>
                                        <option value="1" th:selected="${lop.caHoc != null and lop.caHoc == 1}">Ca 1 (07:00 - 09:25)</option>
                                        <option value="2" th:selected="${lop.caHoc != null and lop.caHoc == 2}">Ca 2 (09:35 - 12:00)</option>
                                        <option value="3" th:selected="${lop.caHoc != null and lop.caHoc == 3}">Ca 3 (13:00 - 15:25)</option>
                                        <option value="4" th:selected="${lop.caHoc != null and lop.caHoc == 4}">Ca 4 (15:35 - 18:00)</option>
                                    </select>
                                </div>
                                <!-- Giờ học -->
                                <div class="col-md-2">
                                    <label class="form-label fw-bold small text-muted">Giờ học</label>
                                    <input type="text" class="form-control"
                                           th:name="'listLopHP[' + ${stat.index} + '].gioHoc'"
                                           th:value="${lop.gioHoc}" placeholder="07:00 - 09:25">
                                </div>
                                <div class="col-md-3">
                                    <label class="form-label fw-bold small text-muted">Phòng học</label>
                                    <input type="text" class="form-control"
                                           th:name="'listLopHP[' + ${stat.index} + '].phongHoc'"
                                           th:value="${lop.phongHoc}">
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label fw-bold small text-muted">Giảng viên</label>
                                    <select class="form-select"
                                            th:name="'listLopHP[' + ${stat.index} + '].giangVien.id'">
                                        <option value="">-- Chọn GV --</option>
                                        <option th:each="gv : ${listgiangvien}"
                                                th:value="${gv.id}"
                                                th:text="${gv.maNV + ' - ' + gv.tenNV}"
                                                th:selected="${lop.giangVien != null and lop.giangVien.id == gv.id}">
                                        </option>
                                    </select>
                                </div>
                                <button type="button"
                                        class="btn btn-sm btn-danger position-absolute top-0 end-0 mt-2 me-2"
                                        style="width:30px;height:30px;padding:0;line-height:30px;"
                                        onclick="this.closest('.lophp-row').remove()">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </div>
                        </th:block>
                    </div>
                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a th:href="@{/admin/hocphan}" class="btn btn-light border px-4">Hủy</a>
                    <button type="submit" class="btn btn-primary px-5 shadow-sm py-2 fw-bold">
                        <i class="fa-solid fa-floppy-disk me-2"></i>Lưu cập nhật
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Template NGOÀI form — KHÔNG dùng bất kỳ th: nào -->
    <div id="lopHP-template" style="display:none;">
        <div class="row g-3 p-3 bg-white shadow-sm mb-3 position-relative lophp-row"
             style="border-radius: 10px; border-left: 4px solid #198754;">
            <div class="col-md-3">
                <label class="form-label fw-bold small text-muted">Mã Lớp HP</label>
                <input type="text" class="form-control" name="listLopHP[__INDEX__].maLopHP">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold small text-muted">Tên Lớp HP</label>
                <input type="text" class="form-control" name="listLopHP[__INDEX__].tenLopHP">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small text-muted">Học Kỳ</label>
                <input type="number" class="form-control" name="listLopHP[__INDEX__].hocKy">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small text-muted">Năm Học</label>
                <input type="text" class="form-control" name="listLopHP[__INDEX__].namHoc">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small text-muted">Sĩ số tối đa</label>
                <input type="number" class="form-control" name="listLopHP[__INDEX__].siSoToiDa" value="50">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small text-muted">Thứ trong tuần</label>
                <select class="form-select" name="listLopHP[__INDEX__].thuTrongTuan">
                    <option value="">-- Chọn thứ --</option>
                    <option value="2">Thứ 2</option>
                    <option value="3">Thứ 3</option>
                    <option value="4">Thứ 4</option>
                    <option value="5">Thứ 5</option>
                    <option value="6">Thứ 6</option>
                    <option value="7">Thứ 7</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold small text-muted">Ca học</label>
                <select class="form-select" name="listLopHP[__INDEX__].caHoc">
                    <option value="">-- Chọn ca --</option>
                    <option value="1">Ca 1 (07:00 - 09:25)</option>
                    <option value="2">Ca 2 (09:35 - 12:00)</option>
                    <option value="3">Ca 3 (13:00 - 15:25)</option>
                    <option value="4">Ca 4 (15:35 - 18:00)</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-bold small text-muted">Giờ học</label>
                <input type="text" class="form-control" name="listLopHP[__INDEX__].gioHoc" placeholder="07:00 - 09:25">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold small text-muted">Phòng học</label>
                <input type="text" class="form-control" name="listLopHP[__INDEX__].phongHoc">
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold small text-muted">Giảng viên</label>
                <select class="form-select" name="listLopHP[__INDEX__].giangVien.id">
                    <option value="">-- Chọn GV --</option>
                </select>
            </div>
            <button type="button"
                    class="btn btn-sm btn-danger position-absolute top-0 end-0 mt-2 me-2"
                    style="width:30px;height:30px;padding:0;line-height:30px;"
                    onclick="this.closest('.lophp-row').remove()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
    </div>

    <!-- ✅ Truyền danh sách GV qua data attribute, không dùng th:inline -->
    <div id="giangVienData" style="display:none;">
        <th:block th:each="gv : ${listgiangvien}">
            <span class="gv-item"
                  th:data-id="${gv.id}"
                  th:data-ten="${gv.maNV + ' - ' + gv.tenNV}"></span>
        </th:block>
    </div>

    <script>
        // ✅ Đọc danh sách GV từ DOM, an toàn không gây lỗi Thymeleaf
        const giangVienList = Array.from(document.querySelectorAll('.gv-item')).map(el => ({
            id: el.dataset.id,
            ten: el.dataset.ten
        }));

        let index = document.querySelectorAll('#lopHP-container .lophp-row').length;

        function addLopHP() {
            const container = document.getElementById('lopHP-container');
            const template = document.getElementById('lopHP-template').innerHTML;
            const newHTML = template.replace(/__INDEX__/g, index);
            const wrapper = document.createElement('div');
            wrapper.innerHTML = newHTML;

            // ✅ Điền danh sách GV vào select của lớp mới
            const gvSelect = wrapper.querySelector('select[name$=".giangVien.id"]');
            if (gvSelect) {
                giangVienList.forEach(gv => {
                    const opt = document.createElement('option');
                    opt.value = gv.id;
                    opt.textContent = gv.ten;
                    gvSelect.appendChild(opt);
                });
            }

            container.appendChild(wrapper.firstElementChild);
            index++;
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
