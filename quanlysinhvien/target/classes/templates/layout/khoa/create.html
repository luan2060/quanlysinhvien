<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Khoa Mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style> body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; } </style>
</head>
<body>
    <div class="position-fixed top-0 start-0 vh-100 shadow-lg" style="width: 260px; z-index: 1030; background-color: #1a252f;">
        <div th:replace="~{layout/header :: header('tongquan')}"></div>
    </div>
    
    <div style="margin-left: 260px; min-height: 100vh;">
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold text-dark mb-1">Thêm Mới Khoa</h4>
                    <p class="text-muted small mb-0">Tạo thông tin cho một khoa/viện đào tạo mới</p>
                </div>
                <a th:href="@{/admin/khoa}" class="btn btn-light border shadow-sm">
                    <i class="fa-solid fa-arrow-left me-2"></i>Quay lại danh sách
                </a>
            </div>

            <div class="card border-0 shadow-sm" style="border-radius: 15px; overflow: hidden;">
                <div class="card-header bg-white border-0 py-3 border-bottom">
                    <h6 class="fw-bold mb-0 text-primary"><i class="fa-solid fa-building-columns me-2"></i>Thông tin Khoa</h6>
                </div>
                <div class="card-body p-4 p-md-5">
                    
                    <form th:action="@{/admin/khoa/create}" th:object="${khoa}" method="post">
                        <div class="row g-4">
                        

                              <div class="col-md-6">
    <label class="form-label fw-medium text-dark small">Mã Khoa <span class="text-danger">*</span></label>
    <input type="text" th:field="*{maKhoa}" 
           class="form-control bg-light border-0 py-2" 
           th:classappend="${#fields.hasErrors('maKhoa')} ? 'is-invalid' : ''"
           required placeholder="Nhập mã khoa nhân viên">
    
    <!-- HIỂN THỊ THÔNG BÁO LỖI TẠI ĐÂY -->
    <div class="invalid-feedback" th:if="${#fields.hasErrors('maKhoa')}" th:errors="*{maKhoa}">
        Lỗi mã khoa nhân viên
    </div>
</div>
                            
                            <div class="col-md-6">
                                <label for="tenKhoa" class="form-label fw-bold">Tên Khoa <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="tenKhoa" th:field="*{tenKhoa}" placeholder="VD: Công nghệ thông tin" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label for="namThanhLap" class="form-label fw-bold">Năm thành lập</label>
                                <input type="number" class="form-control" id="namThanhLap" th:field="*{namThanhLap}" placeholder="VD: 2010">
                            </div>
                            <div class="col-md-6">
    <label for="truongKhoa" class="form-label fw-bold">Trưởng khoa</label>
    <select class="form-select" id="truongKhoa" th:field="*{truongKhoa}">
        <option value="">-- Chọn giảng viên làm trưởng khoa --</option>
       <option th:each="nv : ${danhSachNhanVien}" 
        th:value="${nv.tenNV}"  
        th:text="${nv.maNV + ' - ' + nv.tenNV}">
</option>
    </select>
</div>

                            <div class="col-md-6">
                                <label for="trangThai" class="form-label fw-bold">Trạng thái</label>
                                <select class="form-select" id="trangThai" th:field="*{trangThai}">
                                    <option value="Đang hoạt động">Đang hoạt động</option>
                                    <option value="Tạm dừng">Tạm dừng</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label for="thongTinLienHe" class="form-label fw-bold">Thông tin liên hệ</label>
                                <textarea class="form-control" id="thongTinLienHe" th:field="*{thongTinLienHe}" rows="3" placeholder="Nhập địa chỉ văn phòng khoa, số điện thoại, email..."></textarea>
                            </div>
                        </div>
                        <hr class="my-4 text-muted">
                        <div class="d-flex justify-content-end gap-2">
                            <button type="reset" class="btn btn-light border px-4">Làm mới</button>
                            <button type="submit" class="btn btn-primary px-4 shadow-sm">
                                <i class="fa-solid fa-floppy-disk me-2"></i>Lưu thông tin
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
