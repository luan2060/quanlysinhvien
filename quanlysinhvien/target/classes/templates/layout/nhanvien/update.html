<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập Nhật Nhân Viên</title>
    <!-- Bootstrap 5 & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .stat-card {
            border: none;
            border-radius: 12px;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .icon-box {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="position-fixed top-0 start-0 vh-100 shadow-lg" 
         style="width: 260px; z-index: 1030; background-color: #1a252f;">
        <div th:replace="~{layout/header :: header('tongquan')}"></div>
    </div>
    
    <div style="margin-left: 260px; min-height: 100vh;">
        <div class="container-fluid p-4">
            
            <!-- Tiêu đề và nút quay lại -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold text-dark mb-1">Cập Nhật Thông Tin Nhân Viên</h4>
                    <p class="text-muted small mb-0">Chỉnh sửa thông tin nhân viên trong hệ thống</p>
                </div>
                <a th:href="@{/admin/nhanvien}" class="btn btn-light border shadow-sm">
                    <i class="fa-solid fa-arrow-left me-2"></i>Quay lại danh sách
                </a>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-0 py-3 border-bottom">
                    <h6 class="fw-bold mb-0 text-primary">
                        <i class="fa-solid fa-user-pen me-2"></i>Chỉnh sửa hồ sơ
                    </h6>
                </div>
                <div class="card-body p-4">

                    <!-- Form bắt đầu -->
                    <!-- Lưu ý: action vẫn gọi về hàm save (hoặc update tùy bạn cấu hình trong Controller) -->
                    <form th:action="@{/admin/nhanvien/update}" th:object="${nhanvien}" method="post">
                        
                        <!-- QUAN TRỌNG: Trường ẩn lưu ID để JPA biết đây là lệnh UPDATE chứ không phải INSERT -->
                        <input type="hidden" th:field="*{id}">
                        
                        <div class="row g-4">
                            <!-- Hàng 1: Mã NV (Readonly) & Tên NV -->
                            <div class="col-md-6">
                                <label for="maNV" class="form-label fw-bold">Mã nhân viên <span class="text-danger">*</span></label>
                                <!-- Đã thêm thuộc tính readonly và đổi màu nền để biểu thị không được sửa -->
                                <input type="text" class="form-control" id="maNV" th:field="*{maNV}" readonly style="background-color: #e9ecef;">
                            </div>
                            <div class="col-md-6">
                                <label for="tenNV" class="form-label fw-bold">Họ và tên <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="tenNV" th:field="*{tenNV}" placeholder="Nhập họ và tên" required>
                            </div>

                            <!-- Hàng 2: Ngày sinh & Giới tính -->
                            <div class="col-md-6">
                                <label for="ngaySinh" class="form-label fw-bold">Ngày sinh</label>
                                <input type="date" class="form-control" id="ngaySinh" th:field="*{ngaySinh}">
                            </div>
                            <div class="col-md-6">
                                <label for="gioiTinh" class="form-label fw-bold">Giới tính</label>
                                <select class="form-select" id="gioiTinh" th:field="*{gioiTinh}">
                                    <option value="">-- Chọn giới tính --</option>
                                    <option value="Nam">Nam</option>
                                    <option value="Nữ">Nữ</option>
                                    <option value="Khác">Khác</option>
                                </select>
                            </div>

                            <!-- Hàng 3: Email & Số điện thoại -->
                            <div class="col-md-6">
                                <label for="email" class="form-label fw-bold">Email</label>
                                <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="email@example.com">
                            </div>
                            <div class="col-md-6">
                                <label for="sdt" class="form-label fw-bold">Số điện thoại</label>
                                <input type="tel" class="form-control" id="sdt" th:field="*{sdt}" placeholder="Nhập số điện thoại">
                            </div>

                            <!-- Hàng 4: Học vị & Chức vụ -->
                            <div class="col-md-6">
                                <label for="hocVi" class="form-label fw-bold">Học vị</label>
                                <select class="form-select" id="hocVi" th:field="*{hocVi}">
                                    <option value="">-- Chọn học vị --</option>
                                    <option value="Cử nhân">Cử nhân</option>
                                    <option value="Thạc sĩ">Thạc sĩ</option>
                                    <option value="Tiến sĩ">Tiến sĩ</option>
                                    <option value="Phó Giáo sư">Phó Giáo sư</option>
                                    <option value="Giáo sư">Giáo sư</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="chucVu" class="form-label fw-bold">Chức vụ</label>
                                <select class="form-select" id="chucVu" th:field="*{chucVu}">
                                    <option value="">-- Chọn chức vụ --</option>
                                    <option value="Nhân Viên tài chính & hành chính">Nhân Viên tài chính & hành chính</option>
                                    <option value="Giảng viên">Giảng viên</option>
                                    <option value="Nhân viên phòng đào tạo">Nhân viên phòng đào tạo</option>
                                </select>
                            </div>

                            <!-- Hàng 5: KHOA & Trạng thái -->
                            
                            
                           <div class="col-md-6">
    <label class="form-label fw-medium text-dark small">Thuộc khoa <span class="text-danger">*</span></label>

    <select name="khoaid" class="form-select bg-light border-0 py-2" required>
        
        <option value="">-- Chọn khoa trực thuộc --</option>
        
 
        <option th:each="k : ${listkhoa}" 
                th:value="${k.id}" 
                th:text="${k.tenKhoa}"
                th:selected="${nhanvien.khoa != null && k.id == nhanvien.khoa.id}">
        </option>
        
    </select> 
</div>

                            <div class="col-md-6">
                                <label for="trangThai" class="form-label fw-bold">Trạng thái</label>
                                <select class="form-select" id="trangThai" th:field="*{trangThai}">
                                    <option value="Đang công tác">Đang công tác</option>  
                                    <option value="Đang giảng dạy">Đang giảng dạy</option>                       
                                    <option value="Thôi việc">Thôi việc</option>
                                    <option value="Nghỉ hưu">Nghỉ hưu</option>
                                </select>
                            </div>

                            <!-- Hàng 6: Địa chỉ & Mật khẩu -->
                            <div class="col-md-6">
                                <label for="diaChi" class="form-label fw-bold">Địa chỉ</label>
                                <input type="text" class="form-control" id="diaChi" th:field="*{diaChi}" placeholder="Nhập địa chỉ thường trú">
                            </div>

                            <div class="col-md-6">
                                <label for="password" class="form-label fw-bold">Mật khẩu tài khoản</label>
                                <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Để trống nếu không muốn đổi mật khẩu">
                            </div>
                        </div>

                        <hr class="my-4 text-muted">

                        <!-- Nút Lưu -->
                        <div class="d-flex justify-content-end gap-2">
                            <button type="reset" class="btn btn-light border px-4">Làm mới</button>
                            <button type="submit" class="btn btn-warning px-4 shadow-sm text-dark fw-semibold">
                                <i class="fa-solid fa-pen-to-square me-2"></i>Cập nhật thông tin
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div> 
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
