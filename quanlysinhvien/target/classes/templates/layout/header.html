<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Link Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Cần đảm bảo bạn đã link thư viện CSS của Bootstrap để các class hoạt động -->
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"> -->
</head>
<body>
    <div th:fragment="header(currentPage)">
        <!-- Thêm d-flex flex-column để áp dụng Flexbox -->
        <header class="bg-gradient text-white vh-100 p-3 shadow-lg d-flex flex-column" style="background-color: navy;">

            <!-- Logo -->
            <div style="margin: 35px auto; text-align: center;">
                <img width="140px" src="https://student.hunre.edu.vn/congthongtin/logo.png" alt="Logo">
            </div>

            <!-- Menu -->
            <div class="d-grid gap-2 col-12 mx-auto">
                <a th:href="@{/admin/trangchu}" class="btn btn-primary shadow-sm text-start">
                    <i class="fa-solid fa-house me-2"></i> Tổng Quan
                </a> 
                <a th:href="@{/admin/khoa}" class="btn btn-primary shadow-sm text-start">
                    <i class="fa-solid fa-building-columns me-2"></i> Quản lý khoa
                </a>
                <a th:href="@{/admin/nganh}" class="btn btn-primary shadow-sm text-start">
                    <i class="fa-solid fa-diagram-project me-2"></i> Quản lý ngành
                </a>
                <a th:href="@{/admin/lop}" class="btn btn-primary shadow-sm text-start">
                    <i class="fa-solid fa-chalkboard-user me-2"></i> Quản lý lớp
                </a>
                <a th:href="@{/admin/hocphan}" class="btn btn-primary shadow-sm text-start">
                    <i class="fa-solid fa-layer-group me-2"></i> Học phần
                </a>
                <a th:href="@{/admin/diem}" class="btn btn-primary shadow-sm text-start">
                    <i class="fa-solid fa-pen-to-square me-2"></i> Nhập điểm
                </a>  
                 <a th:href="@{/admin/ctdt}" class="btn btn-primary shadow-sm text-start">
                    <i class="fa-solid fa-book me-2"></i> Chương trinh đào tạo
                </a>      
                <a th:href="@{/admin/sinhvien}" class="btn btn-primary shadow-sm text-start">
                    <i class="fa-solid fa-user-graduate me-2"></i> Sinh viên
                </a>
                <a th:href="@{/admin/nhanvien}" class="btn btn-primary shadow-sm text-start">
                    <i class="fa-solid fa-chalkboard me-2"></i> Nhân viên
                </a>
            </div>

            <!-- Logout (Dùng mt-auto để đẩy block này xuống tận cùng màn hình, mb-4 để cách đáy một chút) -->
           <div class="d-grid gap-2 col-12 mt-auto mb-4">
    <form th:action="@{/logout}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-danger shadow text-start w-100">
            <i class="fa-solid fa-right-from-bracket me-2"></i> Đăng xuất
        </button>
    </form>
</div>

        </header>
    </div>   
</body>
</html>
