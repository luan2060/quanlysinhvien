<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Ngành Đào Tạo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="position-fixed top-0 start-0 vh-100 shadow-lg" style="width: 260px; z-index: 1030; background-color: #1a252f;">
        <div th:replace="~{layout/header :: header('tongquan')}"></div>
    </div>
    
    <div style="margin-left: 260px; min-height: 100vh;">
        <div class="container-fluid p-4">
            
            <!-- Header & Nút thêm mới -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold text-dark mb-1">Quản lý ngành đào tạo</h4>
                    <nav aria-label="breadcrumb">
                        <p class="text-muted mb-0">Quản lý danh sách các ngành học trực thuộc khoa</p>
                    </nav>
                </div>
                <a th:href="@{/admin/nganh/create}" class="btn btn-primary shadow-sm" style="border-radius: 8px;">
                    <i class="fa-solid fa-plus me-2"></i>Thêm ngành mới
                </a>
            </div>

            <!-- Khối Thống kê -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm p-3" style="border-radius: 12px; border-left: 4px solid #0d6efd;">
                        <div class="d-flex align-items-center">
                            <div class="bg-primary bg-opacity-10 p-3 rounded-3 text-primary me-3">
                                <i class="fa-solid fa-layer-group fs-4"></i>
                            </div>
                            <div>
                                <small class="text-muted d-block fw-semibold">TỔNG SỐ NGÀNH</small>
                                <span class="fw-bold fs-5" th:text="${tongNganh}">15</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm p-3" style="border-radius: 12px; border-left: 4px solid #198754;">
                        <div class="d-flex align-items-center">
                            <div class="bg-success bg-opacity-10 p-3 rounded-3 text-success me-3">
                                <i class="fa-solid fa-check-circle fs-4"></i>
                            </div>
                            <div>
                                <small class="text-muted d-block fw-semibold">ĐANG HOẠT ĐỘNG</small>
                                <span class="fw-bold fs-5" th:text="${nganhHoatDong}">10</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm p-3" style="border-radius: 12px; border-left: 4px solid #ffc107;">
                        <div class="d-flex align-items-center">
                            <div class="bg-warning bg-opacity-10 p-3 rounded-3 text-warning me-3">
                                <i class="fa-solid fa-circle-pause fs-4"></i>
                            </div>
                            <div>
                                <small class="text-muted d-block fw-semibold">TẠM DỪNG / KHÁC</small>
                                <span class="fw-bold fs-5" th:text="${nganhTamDung}">5</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bảng danh sách -->
            <div class="card border-0 shadow-sm" style="border-radius: 15px; overflow: hidden;">
                <div class="card-header bg-white border-0 py-3 mt-2">
        <div class="row align-items-center">
            <div class="col-md-7">
                <h5 class="fw-bold mb-0 ps-2">Danh sách ngành </h5>
            </div>
            <div class="col-md-5">
                <form th:action="@{/admin/nganh}" method="get">
                    <div class="input-group" style="border-radius: 10px; overflow: hidden; background: #f8f9fa;">
                        <span class="input-group-text bg-transparent border-0 pe-0">
                            <i class="fa-solid fa-magnifying-glass text-muted"></i>
                        </span>
                        <input type="text" name="keyword" th:value="${keyword}" 
                               class="form-control bg-transparent border-0 shadow-none" 
                               placeholder="Nhập tên ngành cần tìm...">
                        <button class="btn btn-dark px-4" type="submit">Tìm kiếm</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
                
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead style="background-color: #f8f9fa;">
                                <tr class="text-muted small text-uppercase">
                                    <th class="ps-4 py-3">MÃ NGÀNH</th>
                                    <th class="py-3">TÊN NGÀNH</th>
                                    <th class="py-3">THUỘC KHOA</th>
                                    <th class="py-3">TRẠNG THÁI</th>
                                    <th class="text-end pe-4 py-3">THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="nganh : ${listNganh}">
                                    <td class="ps-4 fw-bold text-dark" th:text="${nganh.maNganh}">CNTT01</td>
                                    <td>
                                        <div class="d-flex align-items-center">
                                            <div class="bg-info bg-opacity-10 rounded-circle d-flex align-items-center justify-content-center me-3" style="width: 35px; height: 35px;">
                                                <i class="fa-solid fa-book-open text-info"></i>
                                            </div>
                                            <span class="fw-medium text-dark" th:text="${nganh.tenNganh}">Công nghệ thông tin</span>
                                        </div>
                                    </td>
                                    <td>
                                        <span class="badge bg-light text-dark border fw-normal px-3" th:text="${nganh.khoa != null ? nganh.khoa.tenKhoa : 'Chưa cập nhật'}">Khoa CNTT</span>
                                    </td>
                                    <td>
                                        <span th:if="${nganh.trangThai == 'Đang hoạt động'}" class="badge rounded-pill bg-success-subtle text-success px-3">Đang hoạt động</span>
                                        <span th:if="${nganh.trangThai == 'Tạm dừng'}" class="badge rounded-pill bg-warning-subtle text-warning px-3">Tạm dừng</span>
                                        <span th:unless="${nganh.trangThai == 'Đang hoạt động' or nganh.trangThai == 'Tạm dừng'}" class="badge rounded-pill bg-secondary-subtle text-secondary px-3" th:text="${nganh.trangThai}">Khác</span>
                                    </td>
                                    <td class="text-end pe-4">
                                        <div class="d-flex justify-content-end gap-2">
                                            <a th:href="@{/admin/nganh/update/{id}(id=${nganh.id})}" class="btn btn-sm btn-outline-primary" style="border: none; background: #eef2ff; width: 32px; height: 32px; padding: 0; line-height: 32px; border-radius: 8px;">
                                                <i class="fa-solid fa-pencil-alt"></i>
                                            </a>
                                            <a th:href="@{/admin/nganh/delete/{id}(id=${nganh.id})}" onclick="return confirm('Bạn có chắc chắn muốn xóa ngành này không?');" class="btn btn-sm btn-outline-danger d-inline-flex align-items-center justify-content-center" style="border: none; background: #fff1f2; width: 32px; height: 32px; padding: 0; line-height: 32px; border-radius: 8px;">
                                                <i class="fa-solid fa-trash-can"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(listNganh)}">
                                    <td colspan="5" class="text-center py-5 text-muted">
                                        <i class="fa-solid fa-folder-open d-block fs-2 mb-2 text-secondary"></i>
                                        Không tìm thấy dữ liệu
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
    const searchInput = document.querySelector('input[name="keyword"]');
    let timer;

    // Giữ lại focus sau khi reload
    window.onload = function () {
        const input = document.querySelector('input[name="keyword"]');
        if (input && input.value.length > 0) {
            input.focus();
            // Đưa con trỏ về cuối chuỗi
            const len = input.value.length;
            input.setSelectionRange(len, len);
        }
    };

    searchInput.addEventListener('input', function () {
        clearTimeout(timer);
        timer = setTimeout(() => {
            this.closest('form').submit();
        }, 500);
    });
</script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
