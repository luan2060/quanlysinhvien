<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang chủ</title>
    <!-- Bootstrap 5 & FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Hiệu ứng cho các card thống kê */
        .stat-card {
            border: none;
            border-radius: 12px;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-5px);
        }
        .icon-box {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="position-fixed top-0 start-0 vh-100 shadow-lg" 
         style="width: 260px; z-index: 1030; background-color: #1a252f;">
        <div th:replace="~{layout/header :: header('tongquan')}"></div>
    </div>
    <div style="margin-left: 260px; min-height: 100vh;">
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4 "  >
                <div>
                    <h4 class="fw-bold mb-1">Tổng quan</h4>
                    <nav aria-label="breadcrumb">
                       <p>Tổng quan về trường </p>
                    </nav>
                </div>
                <div class="d-flex gap-2">
                   <p>Welcom,</p>
                   <h5>Vũ Thành Luân</h5>
                </div>
            </div>

            <!-- Bốn bảng thống kê -->
            <div class="row g-3 mb-4">
                <!-- Sinh viên -->
                <div class="col-md-3">
                    <div class="card stat-card shadow-sm p-3">
                        <div class="d-flex align-items-center">
                            <div class="icon-box bg-primary bg-opacity-10 text-primary">
                                <i class="fa-solid fa-user-graduate fs-5"></i>
                            </div>
                            <div class="ms-3">
                                <small class="text-muted fw-bold text-uppercase" style="font-size: 0.7rem;">Sinh viên</small>
                                <h3 class="mb-0 fw-bold" th:text="${tongSinhVien}">2,540</h3>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Lớp học -->
                <div class="col-md-3">
                    <div class="card stat-card shadow-sm p-3">
                        <div class="d-flex align-items-center">
                            <div class="icon-box bg-success bg-opacity-10 text-success">
                                <i class="fa-solid fa-chalkboard-user fs-5"></i>
                            </div>
                            <div class="ms-3">
                                <small class="text-muted fw-bold text-uppercase" style="font-size: 0.7rem;">Lớp học</small>
                                <h3 class="mb-0 fw-bold" th:text="${tonglop}">86</h3>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Tổng Khoa -->
                <div class="col-md-3">
                    <div class="card stat-card shadow-sm p-3">
                        <div class="d-flex align-items-center">
                            <div class="icon-box bg-warning bg-opacity-10 text-warning">
                                <i class="fa-solid fa-building-columns fs-5"></i>
                            </div>
                            <div class="ms-3">
                                <small class="text-muted fw-bold text-uppercase" style="font-size: 0.7rem;">Tổng Khoa</small>
                                <h3 class="mb-0 fw-bold" th:text="${tongkhoa}">12</h3>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- Tốt nghiệp -->
                <div class="col-md-3">
                    <div class="card stat-card shadow-sm p-3">
                        <div class="d-flex align-items-center">
                            <div class="icon-box bg-info bg-opacity-10 text-info">
                                <i class="fa-solid fa-chart-pie fs-5"></i>
                            </div>
                            <div class="ms-3">
    <small class="text-muted fw-bold text-uppercase" 
           style="font-size: 0.7rem;">Tốt nghiệp</small>
    <h3 class="mb-0 fw-bold" 
        th:text="${tyLe} + '%'">94%</h3>
</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-4">
                <!-- Biểu đồ đường tăng trưởng -->
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm p-4 h-100">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="fw-bold mb-0">Biểu đồ tăng trưởng sinh viên</h5>
                            <div class="dropdown">
                                <button class="btn btn-light btn-sm dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                    Năm 2026
                                </button>
                            </div>
                        </div>
                        <div style="height: 350px;">
                            <canvas id="lineChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Bảng tỷ lệ phần trăm theo khoa -->
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm p-4 h-100">
                        <h5 class="fw-bold mb-3">Tỷ lệ theo khoa</h5>
                        <p class="text-muted small">Phân bổ sinh viên dựa trên các khoa trực thuộc.</p>
                        <div class="table-responsive">
                            <table class="table table-hover align-middle border-0">
                                <thead class="table-light">
                                    <tr class="small text-muted">
                                        <th>TÊN KHOA</th>
                                        <th class="text-end">TỶ LỆ</th>
                                    </tr>
                                </thead>
                                <tbody>
                                   <tr th:each="k : ${listKhoa}">
    <td>
        <span class="fw-medium text-dark" th:text="${k.tenKhoa}"></span>
        <small class="text-muted d-block" 
               th:text="${k.soSinhVien} + ' sinh viên'"></small>
    </td>
    <td class="text-end">
        <span class="badge bg-primary-subtle text-primary rounded-pill"
              th:text="${k.phanTram} + '%'">
        </span>
    </td>
</tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div> <!-- End container-fluid -->
    </div> <!-- End main-content -->

    
   <script th:inline="javascript">
    
    const rawData = /*[[${dataGrowth}]]*/ [0, 0, 0, 0, 0, 0]; 

    const ctx = document.getElementById('lineChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Tháng 1', 'Tháng 2', 'Tháng 3', 'Tháng 4', 'Tháng 5', 'Tháng 6'],
            datasets: [{
                label: 'Tổng sinh viên',
                data: rawData, 
                borderColor: '#0d6efd',
                backgroundColor: 'rgba(13, 110, 253, 0.1)',
                borderWidth: 3,
                fill: true,
                tension: 0.4, 
                pointRadius: 5,
                pointBackgroundColor: '#0d6efd'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: { 
                    beginAtZero: true,
                    ticks: {
                        stepSize: 1 
                    }
                },
                x: { grid: { display: false } }
            }
        }
    });
</script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
