<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Chương Trình Đào Tạo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body>
    <div class="position-fixed top-0 start-0 vh-100 shadow-lg"
         style="width: 260px; z-index: 1030; background-color: #1a252f;">
        <div th:replace="~{layout/header :: header('tongquan')}"></div>
    </div>

    <div style="margin-left: 260px; min-height: 100vh;">
        <div class="container-fluid p-4">

            <!-- TIÊU ĐỀ -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold text-dark mb-1">Quản lý Chương trình đào tạo</h4>
                    <p class="text-muted mb-0">Quản lý danh sách các CTĐT thuộc ngành học</p>
                </div>
                <a th:href="@{/admin/ctdt/create}" class="btn btn-primary shadow-sm" style="border-radius: 8px;">
                    <i class="fa-solid fa-plus me-2"></i>Thêm CTĐT mới
                </a>
            </div>

            <!-- THỐNG KÊ -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm p-3" style="border-radius: 12px; border-left: 4px solid #0d6efd;">
                        <div class="d-flex align-items-center">
                            <div class="bg-primary bg-opacity-10 p-3 rounded-3 text-primary me-3">
                                <i class="fa-solid fa-graduation-cap fs-4"></i>
                            </div>
                            <div>
                                <small class="text-muted d-block fw-semibold">TỔNG SỐ CTĐT</small>
                                <span class="fw-bold fs-5" th:text="${tongCTDT}">0</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm p-3" style="border-radius: 12px; border-left: 4px solid #198754;">
                        <div class="d-flex align-items-center">
                            <div class="bg-success bg-opacity-10 p-3 rounded-3 text-success me-3">
                                <i class="fa-solid fa-calendar-check fs-4"></i>
                            </div>
                            <div>
                                <small class="text-muted d-block fw-semibold">ĐANG HOẠT ĐỘNG</small>
                                <span class="fw-bold fs-5" th:text="${ctdtDangApDung}">0</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm p-3" style="border-radius: 12px; border-left: 4px solid #6c757d;">
                        <div class="d-flex align-items-center">
                            <div class="bg-secondary bg-opacity-10 p-3 rounded-3 text-secondary me-3">
                                <i class="fa-solid fa-box-archive fs-4"></i>
                            </div>
                            <div>
                                <small class="text-muted d-block fw-semibold">TẠM DỪNG</small>
                                <span class="fw-bold fs-5" th:text="${ctdtNgungApDung}">0</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- BẢNG DANH SÁCH -->
            <div class="card border-0 shadow-sm" style="border-radius: 15px; overflow: hidden;">
                <div class="card-header bg-white border-0 py-3 mt-2">
                    <h5 class="fw-bold mb-0 ps-2">Danh sách chi tiết</h5>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead style="background-color: #f8f9fa;">
                                <tr class="text-muted small text-uppercase">
                                    <th class="ps-4 py-3">MÃ CTĐT</th>
                                    <th class="py-3">TÊN CHƯƠNG TRÌNH</th>
                                    <th class="py-3">NĂM ÁP DỤNG</th>
                                    <th class="py-3">NGÀNH</th>
                                    <th class="py-3">TRẠNG THÁI</th>
                                    <th class="text-end pe-4 py-3">THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="ct : ${listCTDT}">
                                    <td class="ps-4 fw-bold text-dark" th:text="${ct.maCTDT}">CT001</td>
                                    <td>
                                        <div class="fw-medium text-dark" th:text="${ct.tenCTDT}">Kỹ thuật phần mềm</div>
                                    </td>
                                    <td>
                                        <span class="badge bg-info text-white fw-normal px-3"
                                              th:text="${ct.namApDung}">2025</span>
                                    </td>
                                    <td>
                                        <div class="text-dark"
                                             th:text="${ct.nganh != null ? ct.nganh.tenNganh : 'Chưa cập nhật'}">CNTT</div>
                                    </td>
                                    <td>
                                        <!-- Khớp đúng với DB: 'Hoạt động' | 'Tạm dừng' -->
                                        <span th:if="${ct.trangThai == 'Hoạt động'}"
                                              class="badge rounded-pill bg-success-subtle text-success px-3">
                                            Hoạt động
                                        </span>
                                        <span th:unless="${ct.trangThai == 'Hoạt động'}"
                                              class="badge rounded-pill bg-secondary-subtle text-secondary px-3"
                                              th:text="${ct.trangThai}">Tạm dừng</span>
                                    </td>
                                    <td class="text-end pe-4">
                                        <div class="d-flex justify-content-end gap-2">
                                            <a th:href="@{/admin/ctdt/update/{id}(id=${ct.id})}"
                                               class="btn btn-sm"
                                               style="border: none; background: #eef2ff; color: #0d6efd; width: 32px; height: 32px; padding: 0; line-height: 32px; border-radius: 8px; text-align: center;">
                                                <i class="fa-solid fa-pencil-alt"></i>
                                            </a>
                                            <a th:href="@{/admin/ctdt/delete/{id}(id=${ct.id})}"
                                               onclick="return confirm('Bạn có chắc chắn muốn xóa chương trình này không?');"
                                               class="btn btn-sm"
                                               style="border: none; background: #fff1f2; color: #dc3545; width: 32px; height: 32px; padding: 0; line-height: 32px; border-radius: 8px; text-align: center;">
                                                <i class="fa-solid fa-trash-can"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>

                                <!-- Không có dữ liệu -->
                                <tr th:if="${#lists.isEmpty(listCTDT)}">
                                    <td colspan="6" class="text-center py-5 text-muted">
                                        <i class="fa-solid fa-folder-open d-block fs-2 mb-2 text-secondary"></i>
                                        Không tìm thấy dữ liệu CTĐT
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
