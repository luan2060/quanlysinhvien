<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang cá nhân</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="position-fixed top-0 start-0 vh-100 shadow-lg"
         style="width: 260px; z-index: 1030; background-color: #1a252f;">
        <div th:replace="~{layout/sidebarNV :: sidebarNV('canhan')}"></div>
    </div>

    <!-- NỘI DUNG CHÍNH -->
    <div style="margin-left: 260px; min-height: 100vh;">
        <div class="container-fluid p-4">

            <!-- THÔNG BÁO THÀNH CÔNG -->
            <div th:if="${successMsg}"
                 class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-2"></i>
                <span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- THÔNG BÁO LỖI -->
            <div th:if="${errorMsg}"
                 class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- TIÊU ĐỀ -->
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom border-2"
                 style="border-color: #00509e !important;">
                <h2 class="fw-bold text-dark mb-0">Trang cá nhân</h2>
                <button type="button"
                        class="btn shadow-sm d-flex align-items-center px-4 py-2 rounded-3"
                        style="background-color: #00509e; color: #ffffff;"
                        data-bs-toggle="modal"
                        data-bs-target="#editProfileModal">
                    <i class="fas fa-user-edit me-2"></i> Chỉnh sửa thông tin
                </button>
            </div>

            <!-- THÂN TRANG -->
            <div class="row g-4">

                <!-- CỘT TRÁI: Ảnh + tóm tắt -->
                <div class="col-md-4">
                    <div class="card border-0 shadow-sm rounded-4 text-center h-100">
                        <div class="card-body p-4 d-flex flex-column align-items-center justify-content-center">

                            <img th:src="@{'https://ui-avatars.com/api/?name=' + ${nhanvien.tenNV} + '&background=00509e&color=fff&size=150'}"
                                 alt="Ảnh đại diện"
                                 class="rounded-circle shadow-sm mb-3"
                                 style="width:150px; height:150px; object-fit:cover; border:4px solid #e9ecef;">

                            <h4 class="fw-bold mb-1" style="color:#00509e;"
                                th:text="${nhanvien.tenNV}"></h4>

                            <p class="text-muted mb-1"
                               th:text="${nhanvien.maNV}"></p>

                            <p class="text-muted small mb-2 fst-italic"
                               th:text="${nhanvien.chucVu}"></p>

                            <span class="badge px-3 py-2 rounded-pill fw-medium"
                                  th:classappend="${nhanvien.trangThai == 'Đang làm'} ? 'bg-success' : 'bg-secondary'"
                                  th:text="${nhanvien.trangThai}"></span>
                        </div>
                    </div>
                </div>

                <!-- CỘT PHẢI: Chi tiết thông tin -->
                <div class="col-md-8">
                    <div class="card border-0 shadow-sm rounded-4 h-100">
                        <div class="card-body p-4 p-lg-5">
                            <h5 class="fw-bold text-secondary mb-4 border-bottom pb-3">
                                Chi tiết hồ sơ nhân viên
                            </h5>

                            <!-- Email -->
                            <div class="row py-3 align-items-center">
                                <div class="col-sm-4 text-muted fw-medium">
                                    <i class="fas fa-envelope me-2" style="color:#00509e;"></i> Email
                                </div>
                                <div class="col-sm-8 text-dark fw-medium"
                                     th:text="${nhanvien.email}"></div>
                            </div>
                            <hr class="m-0 border-light">

                            <!-- Ngày sinh -->
                            <div class="row py-3 align-items-center">
                                <div class="col-sm-4 text-muted fw-medium">
                                    <i class="fas fa-calendar-alt me-2" style="color:#00509e;"></i> Ngày sinh
                                </div>
                                <div class="col-sm-8 text-dark"
                                     th:text="${nhanvien.ngaySinh != null} ? ${#dates.format(nhanvien.ngaySinh, 'dd/MM/yyyy')} : 'Chưa cập nhật'"></div>
                            </div>
                            <hr class="m-0 border-light">

                            <!-- Giới tính -->
                            <div class="row py-3 align-items-center">
                                <div class="col-sm-4 text-muted fw-medium">
                                    <i class="fas fa-venus-mars me-2" style="color:#00509e;"></i> Giới tính
                                </div>
                                <div class="col-sm-8 text-dark"
                                     th:text="${nhanvien.gioiTinh != null} ? ${nhanvien.gioiTinh} : 'Chưa cập nhật'"></div>
                            </div>
                            <hr class="m-0 border-light">

                            <!-- Học vị -->
                            <div class="row py-3 align-items-center">
                                <div class="col-sm-4 text-muted fw-medium">
                                    <i class="fas fa-graduation-cap me-2" style="color:#00509e;"></i> Học vị
                                </div>
                                <div class="col-sm-8 text-dark"
                                     th:text="${nhanvien.hocVi != null} ? ${nhanvien.hocVi} : 'Chưa cập nhật'"></div>
                            </div>
                            <hr class="m-0 border-light">

                            <!-- Chức vụ -->
                            <div class="row py-3 align-items-center">
                                <div class="col-sm-4 text-muted fw-medium">
                                    <i class="fas fa-briefcase me-2" style="color:#00509e;"></i> Chức vụ
                                </div>
                                <div class="col-sm-8 text-dark"
                                     th:text="${nhanvien.chucVu != null} ? ${nhanvien.chucVu} : 'Chưa cập nhật'"></div>
                            </div>
                            <hr class="m-0 border-light">

                            <!-- Khoa -->
                            <div class="row py-3 align-items-center">
                                <div class="col-sm-4 text-muted fw-medium">
                                    <i class="fas fa-building me-2" style="color:#00509e;"></i> Khoa
                                </div>
                                <div class="col-sm-8 text-dark"
                                     th:text="${nhanvien.khoa != null} ? ${nhanvien.khoa.tenKhoa} : 'Chưa phân công'"></div>
                            </div>
                            <hr class="m-0 border-light">

                            <!-- Số điện thoại -->
                            <div class="row py-3 align-items-center">
                                <div class="col-sm-4 text-muted fw-medium">
                                    <i class="fas fa-phone-alt me-2" style="color:#00509e;"></i> Số điện thoại
                                </div>
                                <div class="col-sm-8 text-dark"
                                     th:text="${nhanvien.sdt != null} ? ${nhanvien.sdt} : 'Chưa cập nhật'"></div>
                            </div>
                            <hr class="m-0 border-light">

                            <!-- Địa chỉ -->
                            <div class="row py-3 align-items-center">
                                <div class="col-sm-4 text-muted fw-medium">
                                    <i class="fas fa-map-marker-alt me-2" style="color:#00509e;"></i> Địa chỉ
                                </div>
                                <div class="col-sm-8 text-dark"
                                     th:text="${nhanvien.diaChi != null} ? ${nhanvien.diaChi} : 'Chưa cập nhật'"></div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <!-- MODAL SỬA THÔNG TIN -->
            <div class="modal fade" id="editProfileModal" tabindex="-1"
                 aria-labelledby="editProfileModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered modal-lg">
                    <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">

                        <!-- Header -->
                        <div class="modal-header text-white px-4 py-3"
                             style="background-color: #00509e;">
                            <h5 class="modal-title fw-bold" id="editProfileModalLabel">
                                <i class="fas fa-edit me-2"></i> Cập nhật thông tin nhân viên
                            </h5>
                            <button type="button" class="btn-close btn-close-white"
                                    data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>

                        <!-- Form -->
                        <form th:action="@{/nhanvien/trangcanhan/capnhat}"
                              th:object="${updateProfileDTO}"
                              method="post">
                            <div class="modal-body p-4 p-md-5">
                                <div class="row g-4">

                                    <!-- THÔNG TIN CỐ ĐỊNH -->
                                    <div class="col-12">
                                        <h6 class="fw-bold mb-3 d-flex align-items-center"
                                            style="color: #00509e;">
                                            <i class="fas fa-lock me-2"></i> Thông tin cố định
                                        </h6>
                                        <div class="p-3 bg-light rounded-3 border">
                                            <div class="row g-3">
                                                <div class="col-md-6">
                                                    <label class="form-label text-muted small fw-medium">Mã nhân viên</label>
                                                    <input type="text" class="form-control bg-white text-secondary"
                                                           th:value="${nhanvien.maNV}" readonly>
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label text-muted small fw-medium">Họ và tên</label>
                                                    <input type="text" class="form-control bg-white text-secondary"
                                                           th:value="${nhanvien.tenNV}" readonly>
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label text-muted small fw-medium">Email</label>
                                                    <input type="text" class="form-control bg-white text-secondary"
                                                           th:value="${nhanvien.email}" readonly>
                                                </div>
                                                <div class="col-md-6">
                                                    <label class="form-label text-muted small fw-medium">Khoa</label>
                                                    <input type="text" class="form-control bg-white text-secondary"
                                                           th:value="${nhanvien.khoa != null} ? ${nhanvien.khoa.tenKhoa} : 'Chưa phân công'"
                                                           readonly>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- THÔNG TIN CÓ THỂ SỬA -->
                                    <div class="col-12">
                                        <h6 class="text-primary fw-bold mb-3 d-flex align-items-center">
                                            <i class="fas fa-pen-nib me-2"></i> Thông tin có thể thay đổi
                                        </h6>
                                        <div class="p-3 bg-white rounded-3 border border-primary border-opacity-25 shadow-sm">
                                            <div class="row g-3">

                                                <!-- Số điện thoại -->
                                                <div class="col-md-6">
                                                    <label for="sdt" class="form-label fw-medium text-dark">
                                                        Số điện thoại <span class="text-danger">*</span>
                                                    </label>
                                                    <div class="input-group">
                                                        <span class="input-group-text bg-light" style="color:#00509e;">
                                                            <i class="fas fa-phone"></i>
                                                        </span>
                                                        <input type="text" class="form-control" id="sdt"
                                                               th:field="*{sdt}"
                                                               th:classappend="${#fields.hasErrors('sdt')} ? 'is-invalid' : ''">
                                                        <div class="invalid-feedback"
                                                             th:if="${#fields.hasErrors('sdt')}"
                                                             th:errors="*{sdt}"></div>
                                                    </div>
                                                </div>

                                                <!-- Địa chỉ -->
                                                <div class="col-md-6">
                                                    <label for="diaChi" class="form-label fw-medium text-dark">
                                                        Địa chỉ thường trú
                                                    </label>
                                                    <div class="input-group">
                                                        <span class="input-group-text bg-light" style="color:#00509e;">
                                                            <i class="fas fa-map-marker-alt"></i>
                                                        </span>
                                                        <input type="text" class="form-control" id="diaChi"
                                                               th:field="*{diaChi}">
                                                    </div>
                                                </div>

                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>

                            <!-- Footer modal -->
                            <div class="modal-footer bg-light px-4 py-3">
                                <button type="button"
                                        class="btn btn-outline-secondary px-4 fw-medium"
                                        data-bs-dismiss="modal">Hủy bỏ</button>
                                <button type="submit"
                                        class="btn px-4 fw-medium"
                                        style="background-color:#00509e; color:#ffffff;">
                                    <i class="fas fa-save me-2"></i> Lưu thay đổi
                                </button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Tự mở modal nếu có lỗi validation -->
    <script th:if="${showModal}">
        document.addEventListener('DOMContentLoaded', function () {
            var modal = new bootstrap.Modal(document.getElementById('editProfileModal'));
            modal.show();
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
