<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm Ngành Mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style> body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; } </style>
</head>
<body>
    <div class="position-fixed top-0 start-0 vh-100 shadow-lg" style="width: 260px; z-index: 1030; background-color: #1a252f;">
        <div th:replace="~{layout/header :: header('tongquan')}"></div>
    </div>
    
    <div style="margin-left: 260px; min-height: 100vh;">
        <div class="container-fluid p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="fw-bold text-dark mb-1">Thêm Mới Ngành</h4>
                    <p class="text-muted small mb-0">Tạo mã ngành và thông tin ngành học mới</p>
                </div>
                <a th:href="@{/admin/nganh}" class="btn btn-light border shadow-sm">
                    <i class="fa-solid fa-arrow-left me-2"></i>Quay lại danh sách
                </a>
            </div>

            <div class="card border-0 shadow-sm" style="border-radius: 15px; overflow: hidden;">
                <div class="card-header bg-white border-0 py-3 border-bottom">
                    <h6 class="fw-bold mb-0 text-primary"><i class="fa-solid fa-folder-plus me-2"></i>Thông tin ngành</h6>
                </div>
                <div class="card-body p-4 p-md-5">
                    
                    <form th:action="@{/admin/nganh/create}" th:object="${nganh}" method="post">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label for="maNganh" class="form-label fw-bold">Mã ngành <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="maNganh" th:field="*{maNganh}" placeholder="VD: CNTT" required>
                            </div>
                            <div class="col-md-6">
                                <label for="tenNganh" class="form-label fw-bold">Tên ngành đào tạo <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="tenNganh" th:field="*{tenNganh}" placeholder="Nhập tên ngành" required>
                            </div>
                            
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Thuộc khoa <span class="text-danger">*</span></label>
                                <!-- Sử dụng đúng name="khoaid" như bạn đã set up -->
                                <select name="khoaid" class="form-select" required>
                                    <option value="">-- Chọn khoa trực thuộc --</option>
                                    <option th:each="k : ${listkhoa}" th:value="${k.id}" th:text="${k.tenKhoa}"></option>
                                </select> 
                            </div>
                            <div class="col-md-6">
                                <label for="trangThai" class="form-label fw-bold">Trạng thái</label>
                                <select class="form-select" id="trangThai" th:field="*{trangThai}">
                                    <option value="Đang hoạt động">Đang hoạt động</option>
                                    <option value="Tạm dừng">Tạm dừng</option>
                                </select>
                            </div>
                        </div>
                        <hr class="my-4 text-muted">
                        <div class="d-flex justify-content-end gap-2">
                            <button type="reset" class="btn btn-light border px-4">Làm mới</button>
                            <button type="submit" class="btn btn-primary px-4 shadow-sm">
                                <i class="fa-solid fa-floppy-disk me-2"></i>Lưu thông tin
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
